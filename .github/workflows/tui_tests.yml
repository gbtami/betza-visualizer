name: TUI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: "3.13"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --extra dev

    - name: Run Python unit tests
      run: uv run python -m unittest discover -s tests/python_unittests/

    - name: Run Pytest TUI tests
      run: uv run python -m pytest tests/pytest_tests/test_tui.py
