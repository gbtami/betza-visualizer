name: Web App Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install

    - name: Run tests
      run: yarn test

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: 'yarn'

      - name: Install Python dependencies
        run: uv sync --locked --extra dev

      - name: Install Node.js dependencies
        run: yarn install

      - name: Build application
        run: yarn build

      - name: Run web server
        run: uv run python -m http.server 8080 --directory dist &

      - name: Install Playwright Browsers and Run Tests
        run: |
          uv run playwright install --with-deps
          uv run python -m pytest tests/pytest_tests/test_web_app.py
